<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Social Media</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Independent CSS -->
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <i class="fa-solid fa-bolt"></i>
        </div>
        <h1 class="login-title">Sign in to Social</h1>

        <div th:if="${error}" class="error-box">
            <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}">Error</span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="input-control" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="input-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login">Log in</button>
        </form>

<!--        <div style="text-align: center; margin-top: 24px; color: #536471; font-size: 0.9rem;">-->
<!--            Don't have an account? <a href="#" style="color: #1d9bf0;">Sign up</a>-->
<!--        </div>-->
    </div>
</div>

</body>
</html>
