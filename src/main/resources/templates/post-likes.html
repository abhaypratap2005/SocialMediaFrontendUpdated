<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Likes | Social Media</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- BASE CSS -->
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <!-- PAGE CSS -->
    <link rel="stylesheet" th:href="@{/css/post.css}">
</head>
<body>

<div class="app-container">
    <!-- SIDEBAR (DUPLICATED FOR INDEPENDENCE) -->
    <aside class="sidebar">
        <div class="logo">
            <a th:href="@{/feed/{id}(id=${userId})}">
                <i class="fa-solid fa-cloud"></i>
            </a>
        </div>

        <nav class="nav-menu">
            <a th:href="@{/feed/{id}(id=${userId})}" class="nav-item active">
                <i class="fa-solid fa-house"></i> <span>Feed</span>
            </a>
            <a th:href="@{/messages/{id}(id=${userId})}" class="nav-item">
                <i class="fa-solid fa-envelope"></i> <span>Messages</span>
            </a>
            <a th:href="@{/notifications/{id}(id=${userId})}" class="nav-item">
                <i class="fa-solid fa-bell"></i> <span>Notifications</span>
            </a>
            <a th:href="@{/friends/{id}(id=${userId})}" class="nav-item">
                <i class="fa-solid fa-user-group"></i> <span>Friends</span>
            </a>
            <a th:href="@{/trending}" class="nav-item">
                <i class="fa-solid fa-arrow-trend-up"></i> <span>Trending</span>
            </a>
        </nav>

        <div class="logout-container">
            <a th:href="@{/web/logout}" class="nav-item">
                <i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- MAIN FRAME -->
    <main class="main-frame">
        <header class="page-header">
            <h2>Post Likes</h2>
        </header>
        
        <div class="post-interaction-tabs">
            <a th:href="@{/post/{postId}/{userId}/likes(postId=${postId}, userId=${userId})}" 
               class="post-tab-link active">
               Likes (<span th:text="${likes != null ? likes.size() : 0}">0</span>)
            </a>
            <a th:href="@{/post/{postId}/{userId}/comments(postId=${postId}, userId=${userId})}" 
               class="post-tab-link">
               Comments
            </a>
        </div>

        <!-- Empty State -->
        <div th:if="${likes == null or likes.empty}" class="p-4 text-center" 
             style="color: var(--text-muted); padding: 60px 20px;">
            <i class="fa-regular fa-heart" style="font-size: 4rem; opacity: 0.2; margin-bottom: 20px;"></i>
            <p>No likes on this post yet. Be the first to show some love!</p>
        </div>

        <!-- Likes List -->
        <div th:each="like : ${likes}" class="p-4" 
             style="border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;">
            
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="avatar" th:text="${like.username != null ? like.username.substring(0, 1).toUpperCase() : 'U'}">U</div>
                <div>
                    <div style="font-weight: 700;" th:text="${like.username}">Username</div>
                    <div style="color: var(--text-muted); font-size: 0.85rem;" th:text="${#temporals.format(like.timestamp, 'MMM d, yyyy HH:mm')}">Time</div>
                    <div style="font-size: 0.7rem; color: #999;">
                        <span th:text="'User ID: ' + ${like.userID}">ID</span> · 
                        <span th:text="'Like ID: ' + ${like.likeID}">ID</span>
                    </div>
                </div>
            </div>

            <button class="btn btn-outline" style="padding: 6px 16px; font-size: 0.85rem;">Follow</button>
        </div>

        <div style="padding: 20px; text-align: center;">
            <a th:href="@{/post/{postId}/{userId}(postId=${postId}, userId=${userId})}" class="btn btn-ghost" style="width: 100%;">Back to Post</a>
        </div>
    </main>

    <!-- RIGHT SIDEBAR (DUPLICATED) -->
    <aside class="right-sidebar">
        <div style="background: var(--bg-secondary); padding: 16px; border-radius: 12px; margin-bottom: 20px;">
            <h3 style="font-size: 1.1rem; font-weight: 800; margin-bottom: 8px;">Paddock Updates</h3>
            <p style="color: var(--text-muted); font-size: 0.85rem;">Check out the latest trending posts to stay updated.</p>
        </div>
    </aside>
</div>

</body>
</html>
